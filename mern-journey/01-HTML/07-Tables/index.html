<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tables</title>
</head>
<body>
  <h1>Student Information</h1>
  <table border="1">
    <tr>
      <th>Name</th>
      <th>Age</th>
      <th>Course</th>
    </tr>
    <tr>
      <td>Kamlesh</td>
      <td>23</td>
      <td>BSc.IT</td>
    </tr>
    <tr>
      <td>Rahul</td>
      <td>21</td>
      <td>BCA</td>
    </tr>
    <tr>
      <td>Priya</td>
      <td>22</td>
      <td>B.Tech</td>
    </tr>
  </table><br>
  <table border="1">
    <tr>
      <th colspan="3">Weekly Study Timetable</th>
    </tr>
    <tr>
      <th>Day</th>
      <th>Subject</th>
      <th>Time</th>
    </tr>
    <tr>
      <td>1</td>
      <td>HTML</td>
      <td>3hr</td>
    </tr>
    <tr>
      <td>2</td>
      <td>CSS</td>
      <td>3hr</td>
    </tr>
    <tr>
      <td>3</td>
      <td>JavaScript</td>
      <td>3hr</td>
    </tr>
  </table>
</body>
</html>
